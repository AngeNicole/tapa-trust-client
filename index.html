<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaPa Trust</title>
    <meta name="description" content="TaPa Trust — book verified informal skilled workers in Kigali. Verified identities, agreed prices, escrow-held payment, and dispute mediation." />
    <!-- Start the font + API connections early. The font CSS is loaded
         NON-render-blocking (preload → swap to stylesheet onload) so first paint
         isn't held behind a font download on slow networks; display=swap renders
         text immediately in a fallback, then swaps. <noscript> keeps it working
         without JS. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://tapa-trust-server.onrender.com" />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
